<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#fafaf7"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#1a202c">
    Figur 0.2 — Systemlandskabet (anonymiseret), juni 2025
  </text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#718096">
    Tolv systemer, ingen integration — data bor tolv steder
  </text>

  <!-- Center: ERP that should be the hub -->
  <circle cx="450" cy="290" r="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">ERP</text>
  <text x="450" y="302" text-anchor="middle" font-size="9" fill="#1e3a8a">(mål: single source</text>
  <text x="450" y="313" text-anchor="middle" font-size="9" fill="#1e3a8a">of truth)</text>

  <!-- Legacy system being phased out -->
  <g>
    <rect x="370" y="380" width="160" height="40" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="450" y="397" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Gammelt regnskab</text>
    <text x="450" y="411" text-anchor="middle" font-size="9" font-style="italic" fill="#7f1d1d">(udfases gradvist)</text>
  </g>

  <!-- Surrounding systems - 12 total in cluster around ERP -->
  <g font-size="10" fill="#1a202c">
    <!-- Top row: Compliance/data systems -->
    <rect x="100" y="100" width="120" height="36" rx="4" fill="#ecfdf5" stroke="#10b981"/>
    <text x="160" y="115" text-anchor="middle" font-weight="600">Datasync</text>
    <text x="160" y="128" text-anchor="middle" font-size="9" fill="#475569">stamdata til kæder</text>

    <rect x="240" y="100" width="120" height="36" rx="4" fill="#ecfdf5" stroke="#10b981"/>
    <text x="300" y="115" text-anchor="middle" font-weight="600">Emballage-system</text>
    <text x="300" y="128" text-anchor="middle" font-size="9" fill="#475569">EPR-data</text>

    <rect x="380" y="100" width="120" height="36" rx="4" fill="#ecfdf5" stroke="#10b981"/>
    <text x="440" y="115" text-anchor="middle" font-weight="600">GTIN-tildeling</text>
    <text x="440" y="128" text-anchor="middle" font-size="9" fill="#475569">stregkoder</text>

    <rect x="520" y="100" width="120" height="36" rx="4" fill="#ecfdf5" stroke="#10b981"/>
    <text x="580" y="115" text-anchor="middle" font-weight="600">Kollektivordning</text>
    <text x="580" y="128" text-anchor="middle" font-size="9" fill="#475569">indberetning</text>

    <rect x="660" y="100" width="120" height="36" rx="4" fill="#ecfdf5" stroke="#10b981"/>
    <text x="720" y="115" text-anchor="middle" font-weight="600">Ingredienstest</text>
    <text x="720" y="128" text-anchor="middle" font-size="9" fill="#475569">CPSR-godkendelse</text>

    <!-- Middle row left: webshops -->
    <rect x="80" y="220" width="100" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="130" y="235" text-anchor="middle" font-weight="600">Webshop A</text>
    <text x="130" y="248" text-anchor="middle" font-size="9" fill="#475569">B2C</text>

    <rect x="80" y="280" width="100" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="130" y="295" text-anchor="middle" font-weight="600">Webshop B</text>
    <text x="130" y="308" text-anchor="middle" font-size="9" fill="#475569">B2B</text>

    <rect x="80" y="340" width="100" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="130" y="355" text-anchor="middle" font-weight="600">CMS / blog</text>
    <text x="130" y="368" text-anchor="middle" font-size="9" fill="#475569">indhold</text>

    <!-- Middle row right: process tools -->
    <rect x="720" y="220" width="100" height="36" rx="4" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="770" y="235" text-anchor="middle" font-weight="600">Projektværktøj</text>
    <text x="770" y="248" text-anchor="middle" font-size="9" fill="#475569">opgaver, deadlines</text>

    <rect x="720" y="280" width="100" height="36" rx="4" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="770" y="295" text-anchor="middle" font-weight="600">BI / dashboards</text>
    <text x="770" y="308" text-anchor="middle" font-size="9" fill="#475569">rapportering</text>

    <rect x="720" y="340" width="100" height="36" rx="4" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="770" y="355" text-anchor="middle" font-weight="600">Excel-ark</text>
    <text x="770" y="368" text-anchor="middle" font-size="9" fill="#475569">prisberegning, lister</text>
  </g>

  <!-- Customer types at bottom -->
  <g font-size="10" fill="#1a202c">
    <rect x="100" y="450" width="140" height="50" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
    <text x="170" y="468" text-anchor="middle" font-weight="600">OEM-kunder</text>
    <text x="170" y="483" text-anchor="middle" font-size="9" fill="#475569">Egne brands → andres</text>
    <text x="170" y="494" text-anchor="middle" font-size="9" fill="#475569">distributionskanal</text>

    <rect x="260" y="450" width="140" height="50" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
    <text x="330" y="468" text-anchor="middle" font-weight="600">Private Label</text>
    <text x="330" y="483" text-anchor="middle" font-size="9" fill="#475569">Discount, kæder</text>

    <rect x="420" y="450" width="140" height="50" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
    <text x="490" y="468" text-anchor="middle" font-weight="600">Private Brand</text>
    <text x="490" y="483" text-anchor="middle" font-size="9" fill="#475569">stort kæde-brand</text>

    <rect x="580" y="450" width="140" height="50" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
    <text x="650" y="468" text-anchor="middle" font-weight="600">Own Brands</text>
    <text x="650" y="483" text-anchor="middle" font-size="9" fill="#475569">apotek, varehus</text>
  </g>

  <!-- Connection lines (showing some, not all - the point is it's messy) -->
  <g stroke="#9ca3af" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="160" y1="136" x2="420" y2="240"/>
    <line x1="300" y1="136" x2="430" y2="240"/>
    <line x1="440" y1="136" x2="450" y2="230"/>
    <line x1="580" y1="136" x2="475" y2="240"/>
    <line x1="720" y1="136" x2="490" y2="245"/>

    <line x1="180" y1="238" x2="395" y2="290"/>
    <line x1="180" y1="298" x2="395" y2="295"/>
    <line x1="180" y1="358" x2="395" y2="305"/>

    <line x1="720" y1="238" x2="510" y2="290"/>
    <line x1="720" y1="298" x2="510" y2="295"/>
    <line x1="720" y1="358" x2="510" y2="305"/>

    <line x1="450" y1="350" x2="450" y2="378"/>
  </g>

  <!-- Customer connections - show messiness -->
  <g stroke="#94a3b8" stroke-width="0.8" fill="none" stroke-dasharray="2,2">
    <line x1="170" y1="450" x2="430" y2="345"/>
    <line x1="330" y1="450" x2="445" y2="350"/>
    <line x1="490" y1="450" x2="455" y2="350"/>
    <line x1="650" y1="450" x2="470" y2="350"/>
  </g>

  <!-- Key insight callout -->
  <g>
    <rect x="540" y="180" width="320" height="40" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
    <text x="700" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">"Ikke ét system — tolv.</text>
    <text x="700" y="214" text-anchor="middle" font-size="11" fill="#713f12">Tolv halve billeder, samlet manuelt."</text>
  </g>

  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" font-size="10" fill="#a0aec0">
    Strukturel illustration — system- og kundetyper er generaliseret i forhold til original Mural-tavle.
  </text>
</svg>
